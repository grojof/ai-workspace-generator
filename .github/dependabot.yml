version: 2
updates:
  # Keep GitHub Actions current (e.g. the checkout/setup-node Node-runtime deprecations).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
  # Keep npm dev dependencies current.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore
    groups:
      dev-dependencies:
        dependency-type: development
